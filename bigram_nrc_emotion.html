<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Instagram Bigram Network</title>
<script src="vis-network.min.js"></script>
<style>
  :root {
    --ink: #172033;
    --muted: #6b7280;
    --panel: rgba(255, 255, 255, 0.92);
    --line: rgba(148, 163, 184, 0.28);
  }

  * { box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    background: #f7f9fc;
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body { padding: 24px; }

  .network-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 20px;
    margin: 0 0 14px;
    padding: 0 2px 14px;
    border-bottom: 1px solid var(--line);
  }

  .network-header__title {
    margin: 0;
    color: #111827;
    font-size: 32px;
    font-weight: 780;
    letter-spacing: 0;
    line-height: 1.12;
  }

  .network-header__meta {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.45;
  }

  .network-header__badge {
    flex: 0 0 auto;
    padding: 7px 10px;
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 7px;
    background: rgba(255, 255, 255, 0.72);
    color: #334155;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .chart-shell {
    position: relative;
    height: calc(100vh - 128px);
    min-height: 560px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: radial-gradient(circle at 20% 10%, rgba(29, 78, 216, 0.05), transparent 24%), linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
    box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
  }

  #network {
    width: 100%;
    height: 100%;
  }

  .network-toolbar {
    position: fixed;
    top: 42px;
    right: 30px;
    z-index: 10;
    width: 288px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 16px 42px rgba(15, 23, 42, 0.12);
    backdrop-filter: blur(14px);
  }

  .network-toolbar__title {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 750;
    letter-spacing: 0;
  }

  .network-toolbar__subtitle {
    margin: 0 0 12px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }

  .control-row { margin-bottom: 12px; }

  .control-row label {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
    color: #374151;
    font-size: 14px;
    font-weight: 650;
  }

  .control-row input[type="range"] { width: 100%; accent-color: #2563eb; }

  .toolbar-button, .emotion-button, .word-list__button {
    border: 0;
    border-radius: 7px;
    cursor: pointer;
    font: inherit;
    transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease, background 140ms ease, border-color 140ms ease;
  }

  .toolbar-button:hover, .emotion-button:hover, .word-list__button:hover { transform: translateY(-1px); }

  .toolbar-button {
    width: 100%;
    margin-bottom: 12px;
    padding: 10px 10px;
    background: #172033;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
  }

  .emotion-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .emotion-button {
    min-height: 34px;
    padding: 7px 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    text-align: left;
  }

  .emotion-button.is-active { box-shadow: 0 0 0 2px #172033 inset; }

  .emotion-button[data-emotion="none"] {
    grid-column: 1 / -1;
    background: #64748b;
    text-align: center;
  }

  .word-list-panel {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .word-list-panel__header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .word-list-panel__title { font-size: 15px; font-weight: 750; }
  .word-list-panel__count { color: var(--muted); font-size: 13px; white-space: nowrap; }

  .word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 150px;
    margin: 0;
    padding: 0;
    overflow: auto;
    list-style: none;
  }

  .word-list__item { display: contents; }

  .word-list__button {
    max-width: 100%;
    padding: 5px 8px;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(248, 250, 252, 0.88);
    color: #253044;
    font-size: 13px;
    line-height: 1.2;
    text-align: left;
  }

  .word-list__button:hover, .word-list__button.is-selected {
    border-color: rgba(37, 99, 235, 0.46);
    background: rgba(219, 234, 254, 0.9);
    color: #1d4ed8;
  }

  .word-list__button span { color: var(--muted); }

  .loading-note {
    position: absolute;
    left: 24px;
    bottom: 20px;
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
  }

  @media (max-width: 720px) {
    body { padding: 12px; }
    .network-header { align-items: start; flex-direction: column; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; }
    .network-header__title { font-size: 24px; }
    .network-header__meta { font-size: 13px; }
    .chart-shell { height: calc(100vh - 116px); min-height: 520px; }
    .network-toolbar { top: auto; right: 12px; bottom: 12px; left: 12px; width: auto; }
    .control-row { display: none; }
    .emotion-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .word-list { max-height: 90px; }
  }
</style>
</head>
<body>
<header class="network-header" aria-label="Chart title">
  <div>
    <h1 class="network-header__title">Instagram Bigram Network</h1>
    <p class="network-header__meta">NRC emotion filter for exploring word pairs, sentiment clusters, and connected terms.</p>
  </div>
  <div class="network-header__badge">NRC Emotion Filter</div>
</header>

<main class="chart-shell">
  <div id="network"></div>
  <div class="loading-note" id="loadingNote">Loading network...</div>
</main>

<aside class="network-toolbar" aria-label="Network controls">
  <h2 class="network-toolbar__title">Bigram Emotion Network</h2>
  <p class="network-toolbar__subtitle">Filter by NRC emotion. Node size reflects word frequency; edge width reflects bigram count.</p>

  <div class="control-row">
    <label for="modernRepulsion"><span>Repulsion</span><b id="modernRepVal">-200</b></label>
    <input id="modernRepulsion" type="range" min="-500" max="-10" value="-200" step="10">
  </div>

  <div class="control-row">
    <label for="modernLength"><span>Link length</span><b id="modernLenVal">60</b></label>
    <input id="modernLength" type="range" min="30" max="300" value="60" step="10">
  </div>

  <button class="toolbar-button" type="button" id="modernRelayout">Re-layout network</button>

  <div class="emotion-grid" id="modernEmotionGrid">
    <button class="emotion-button" type="button" data-emotion="anger" style="background:#dc2626;">Anger</button>
    <button class="emotion-button" type="button" data-emotion="fear" style="background:#7c3aed;">Fear</button>
    <button class="emotion-button" type="button" data-emotion="sadness" style="background:#2563eb;">Sadness</button>
    <button class="emotion-button" type="button" data-emotion="disgust" style="background:#16a34a;">Disgust</button>
    <button class="emotion-button" type="button" data-emotion="surprise" style="background:#d97706;">Surprise</button>
    <button class="emotion-button" type="button" data-emotion="anticipation" style="background:#ea580c;">Anticipation</button>
    <button class="emotion-button" type="button" data-emotion="joy" style="background:#ca8a04;">Joy</button>
    <button class="emotion-button" type="button" data-emotion="trust" style="background:#0d9488;">Trust</button>
    <button class="emotion-button is-active" type="button" data-emotion="none">Show all</button>
  </div>

  <section class="word-list-panel" aria-live="polite">
    <div class="word-list-panel__header">
      <div class="word-list-panel__title">Matched words</div>
      <div class="word-list-panel__count" id="modernWordCount">0 words</div>
    </div>
    <ul class="word-list" id="modernWordList"></ul>
  </section>
</aside>

;\n        setTimeout(function(){ net.setOptions({ physics: { enabled: false } }); }, 3000);\n      }\n    }","stabilizationIterationsDone":"function() {\n      this.setOptions({ physics: { enabled: false } });\n      window._visNetwork = this;\n    }"}}</script>
<script>
(function() {
  var raw = JSON.parse(document.getElementById('network-data').textContent);
  var modernPalette = {
    anger: '#dc2626', fear: '#7c3aed', sadness: '#2563eb', disgust: '#16a34a',
    surprise: '#d97706', anticipation: '#ea580c', joy: '#ca8a04', trust: '#0d9488', none: '#94a3b8'
  };
  var modernOriginalNodeStyles = {};
  var modernOriginalEdgeStyles = {};
  var modernNodeEmotions = {};
  var modernNodeMeta = {};
  var modernActiveEmotion = 'none';
  var modernSelectedNodeId = null;
  var network;

  function frameToRows(frame) {
    var keys = Object.keys(frame || {});
    var len = keys.length ? frame[keys[0]].length : 0;
    var rows = [];
    for (var i = 0; i < len; i++) {
      var row = {};
      keys.forEach(function(key) { row[key] = frame[key][i]; });
      rows.push(row);
    }
    return rows;
  }

  function getModernFontSize(value) {
    if (value >= 15) return 30;
    if (value >= 9) return 26;
    if (value >= 6) return 23;
    return 20;
  }

  function getModernMatchedNodeIds(emotion) {
    return Object.keys(modernNodeMeta).filter(function(id) {
      var emotions = (modernNodeEmotions[id] || 'none').split(',');
      return emotion === 'none' || emotions.indexOf(emotion) !== -1;
    });
  }

  function escapeModernHtml(value) {
    return String(value).replace(/[&<>"']/g, function(char) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
    });
  }

  function updateModernWordList(emotion) {
    var list = document.getElementById('modernWordList');
    var count = document.getElementById('modernWordCount');
    var words = getModernMatchedNodeIds(emotion).map(function(id) {
      return { id: id, label: modernNodeMeta[id].label, value: modernNodeMeta[id].value };
    }).sort(function(a, b) { return b.value - a.value || a.label.localeCompare(b.label); });

    count.innerText = words.length + (words.length === 1 ? ' word' : ' words');
    list.innerHTML = words.slice(0, 80).map(function(word) {
      var selectedClass = word.id === modernSelectedNodeId ? ' is-selected' : '';
      return '<li class="word-list__item"><button class="word-list__button' + selectedClass +
        '" type="button" data-node-id="' + escapeModernHtml(word.id) + '">' +
        escapeModernHtml(word.label) + ' <span>(' + word.value + ')</span></button></li>';
    }).join('');
  }

  function resetModernEdges(visibleIds) {
    network.body.data.edges.update(network.body.data.edges.get().map(function(edge) {
      var original = modernOriginalEdgeStyles[edge.id] || { width: Number(edge.width) || 1 };
      var visible = !visibleIds || (visibleIds[edge.from] && visibleIds[edge.to]);
      return { id: edge.id, color: { color: 'rgba(71,85,105,0.46)' }, width: original.width, hidden: !visible };
    }));
  }

  function modernFilterEmotion(emotion) {
    modernActiveEmotion = emotion;
    modernSelectedNodeId = null;

    var matchedIds = {};

    network.body.data.nodes.get().forEach(function(node) {
      var emotions = (modernNodeEmotions[node.id] || 'none').split(',');
      var match = emotion === 'none' || emotions.indexOf(emotion) !== -1;
      if (match) {
        matchedIds[node.id] = true;
      }
    });

    network.body.data.nodes.update(network.body.data.nodes.get().map(function(node) {
      var style = modernOriginalNodeStyles[node.id] || { background: modernPalette.none, border: '#ffffff', fontColor: '#172033' };
      var meta = modernNodeMeta[node.id] || { fontSize: 15 };
      var isMatched = !!matchedIds[node.id];
      var isMuted = emotion !== 'none' && !isMatched;
      var activeColor = emotion === 'none' ? style.background : modernPalette[emotion] || style.background;

      return {
        id: node.id,
        hidden: false,
        color: {
          background: isMatched ? activeColor : 'rgba(203,213,225,0.7)',
          border: isMatched ? activeColor : 'rgba(148,163,184,0.85)',
          highlight: { background: isMatched ? activeColor : 'rgba(203,213,225,0.85)', border: '#172033' },
          hover: { background: isMatched ? activeColor : 'rgba(203,213,225,0.85)', border: '#172033' }
        },
        font: {
          color: isMatched ? style.fontColor : '#64748b',
          size: isMuted ? Math.max(meta.fontSize - 2, 16) : meta.fontSize,
          strokeWidth: 4,
          strokeColor: 'rgba(255,255,255,0.92)'
        },
        shadow: isMatched,
        borderWidth: isMatched ? 1 : 1
      };
    }));

    network.body.data.edges.update(network.body.data.edges.get().map(function(edge) {
      var original = modernOriginalEdgeStyles[edge.id] || { width: Number(edge.width) || 1 };
      var isConnectedToMatch = !!matchedIds[edge.from] || !!matchedIds[edge.to];
      return {
        id: edge.id,
        hidden: false,
        color: { color: emotion === 'none' ? original.color : isConnectedToMatch ? 'rgba(51,65,85,0.58)' : 'rgba(100,116,139,0.28)' },
        width: emotion === 'none' ? original.width : isConnectedToMatch ? Math.max(original.width, 1.45) : Math.max(original.width * 0.5, 0.7)
      };
    }));

    network.unselectAll();
    document.querySelectorAll('#modernEmotionGrid .emotion-button').forEach(function(button) {
      button.classList.toggle('is-active', button.dataset.emotion === emotion);
    });
    updateModernWordList(emotion);
  }
  function focusModernNode(nodeId) {
    modernSelectedNodeId = nodeId;
    var connectedIds = network.getConnectedNodes(nodeId);
    var visibleIds = {};
    visibleIds[nodeId] = true;
    connectedIds.forEach(function(id) { visibleIds[id] = true; });
    var emotionMatches = {};
    getModernMatchedNodeIds(modernActiveEmotion).forEach(function(id) { emotionMatches[id] = true; });

    network.body.data.nodes.update(network.body.data.nodes.get().map(function(node) {
      var style = modernOriginalNodeStyles[node.id] || { background: modernPalette.none, border: '#ffffff', fontColor: '#172033' };
      var isFocus = node.id === nodeId;
      var isNeighbor = !!visibleIds[node.id];
      var isEmotionMatch = !!emotionMatches[node.id];
      var isVisible = isNeighbor || isEmotionMatch;
      var meta = modernNodeMeta[node.id] || { fontSize: 15 };
      return {
        id: node.id,
        hidden: !isVisible,
        color: {
          background: style.background,
          border: isFocus ? '#111827' : isNeighbor ? '#2563eb' : style.border,
          highlight: { background: style.background, border: '#111827' },
          hover: { background: style.background, border: '#111827' }
        },
        font: { color: style.fontColor, size: isFocus ? Math.min(meta.fontSize + 4, 38) : isNeighbor ? Math.min(meta.fontSize + 2, 35) : meta.fontSize, strokeWidth: 4, strokeColor: 'rgba(255,255,255,0.92)' },
        shadow: true,
        borderWidth: isFocus ? 3 : isNeighbor ? 2 : 1
      };
    }));

    network.body.data.edges.update(network.body.data.edges.get().map(function(edge) {
      var isConnected = edge.from === nodeId || edge.to === nodeId;
      var original = modernOriginalEdgeStyles[edge.id] || { width: Number(edge.width) || 1 };
      var width = original.width;
      var edgeVisible = visibleIds[edge.from] && visibleIds[edge.to];
      return { id: edge.id, color: { color: isConnected ? 'rgba(37,99,235,0.82)' : 'rgba(100,116,139,0.32)' }, width: isConnected ? Math.max(width + 1.4, 2.6) : Math.max(width * 0.68, 0.9), hidden: !edgeVisible };
    }));

    network.selectNodes([nodeId]);
    network.focus(nodeId, { scale: 1.25, animation: { duration: 650, easingFunction: 'easeInOutQuad' } });
    updateModernWordList(modernActiveEmotion);
  }

  function runModernPhysics(duration) {
    network.setOptions({ physics: { enabled: true } });
    clearTimeout(window._modernPhysicsTimer);
    window._modernPhysicsTimer = setTimeout(function() {
      network.setOptions({ physics: { enabled: false } });
      network.fit({ animation: { duration: 450, easingFunction: 'easeInOutQuad' } });
    }, duration || 1600);
  }

  function init() {
    if (!window.vis || !window.vis.Network) {
      document.getElementById('loadingNote').textContent = 'Unable to load vis-network library. Please check internet access.';
      return;
    }

    var nodeRows = frameToRows(raw.nodes);
    var edgeRows = frameToRows(raw.edges);
    var nodes = nodeRows.map(function(node) {
      var emotion = node.main_emotion || 'none';
      var color = modernPalette[emotion] || modernPalette.none;
      var value = Number(node.value) || 0;
      modernOriginalNodeStyles[node.id] = { background: color, border: '#ffffff', fontColor: '#172033' };
      modernNodeEmotions[node.id] = node.emotions || 'none';
      modernNodeMeta[node.id] = { label: node.label || node.id, value: value, fontSize: getModernFontSize(value) };
      return {
        id: node.id,
        label: node.label || node.id,
        value: value,
        main_emotion: emotion,
        emotions: node.emotions || 'none',
        shape: 'dot',
        color: { background: color, border: '#ffffff', highlight: { background: color, border: '#172033' }, hover: { background: color, border: '#172033' } },
        font: { color: '#172033', size: getModernFontSize(value), face: 'Inter, Segoe UI, sans-serif', strokeWidth: 4, strokeColor: 'rgba(255,255,255,0.92)' },
        shadow: { enabled: true, color: 'rgba(15,23,42,0.16)', size: 10, x: 0, y: 4 }
      };
    });

    var edges = edgeRows.map(function(edge, index) {
      var id = 'e' + index;
      var width = Number(edge.width) || 1;
      modernOriginalEdgeStyles[id] = { width: width };
      return { id: id, from: edge.from, to: edge.to, width: width, title: edge.title || '', smooth: { enabled: true, type: 'dynamic', roundness: 0.2 }, color: { color: 'rgba(71,85,105,0.46)', highlight: 'rgba(37,99,235,0.82)', hover: 'rgba(37,99,235,0.68)', inherit: false } };
    });

    network = new vis.Network(document.getElementById('network'), { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, {
      nodes: { borderWidth: 1, borderWidthSelected: 2, scaling: { min: 16, max: 46 } },
      edges: { selectionWidth: 1.8, hoverWidth: 1.4 },
      interaction: { hover: true, dragNodes: true, dragView: true, zoomView: true, tooltipDelay: 80, multiselect: false, navigationButtons: false, keyboard: false },
      physics: { solver: 'forceAtlas2Based', minVelocity: 0.5, stabilization: { enabled: true, iterations: 300, fit: true }, forceAtlas2Based: { gravitationalConstant: -200, springLength: 60, springConstant: 0.1, damping: 0.3 } },
      layout: { randomSeed: 42 }
    });
    window._visNetwork = network;
    network.once('stabilizationIterationsDone', function() { network.setOptions({ physics: { enabled: false } }); });
    network.on('dragStart', function(params) {
      if (params.nodes.length > 0) {
        clearTimeout(window._dragPhysicsTimer);
        params.nodes.forEach(function(nodeId) {
          network.body.data.nodes.update({ id: nodeId, fixed: { x: true, y: true } });
        });
        network.setOptions({ physics: { enabled: true } });
      }
    });
    network.on('dragging', function(params) {
      if (params.nodes.length > 0 && params.pointer && params.pointer.canvas) {
        params.nodes.forEach(function(nodeId) {
          network.body.data.nodes.update({
            id: nodeId,
            x: params.pointer.canvas.x,
            y: params.pointer.canvas.y,
            fixed: { x: true, y: true }
          });
        });
      }
    });
    network.on('dragEnd', function(params) {
      if (params.nodes.length > 0) {
        params.nodes.forEach(function(nodeId) {
          var position = network.getPositions([nodeId])[nodeId];
          network.body.data.nodes.update({ id: nodeId, x: position.x, y: position.y, fixed: { x: true, y: true } });
        });
        clearTimeout(window._dragPhysicsTimer);
        window._dragPhysicsTimer = setTimeout(function() {
          network.setOptions({ physics: { enabled: false } });
        }, 3000);
      }
    });
    network.on('doubleClick', function(params) {
      if (params.nodes.length > 0) {
        network.body.data.nodes.update({ id: params.nodes[0], fixed: { x: false, y: false } });
        runModernPhysics(1800);
      }
    });
    document.getElementById('loadingNote').style.display = 'none';
    modernFilterEmotion('none');
  }

  document.getElementById('modernRepulsion').addEventListener('input', function() {
    document.getElementById('modernRepVal').innerText = this.value;
    network.setOptions({ physics: { enabled: true, forceAtlas2Based: { gravitationalConstant: parseFloat(this.value) } } });
    runModernPhysics(1300);
  });

  document.getElementById('modernLength').addEventListener('input', function() {
    document.getElementById('modernLenVal').innerText = this.value;
    network.setOptions({ physics: { enabled: true, forceAtlas2Based: { springLength: parseFloat(this.value) } } });
    runModernPhysics(1300);
  });

  document.getElementById('modernRelayout').addEventListener('click', function() { runModernPhysics(2600); });
  document.getElementById('modernEmotionGrid').addEventListener('click', function(event) {
    var button = event.target.closest('[data-emotion]');
    if (button) modernFilterEmotion(button.dataset.emotion);
  });
  document.getElementById('modernWordList').addEventListener('click', function(event) {
    var button = event.target.closest('[data-node-id]');
    if (button) focusModernNode(button.dataset.nodeId);
  });

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
